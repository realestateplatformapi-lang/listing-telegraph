<!doctype html>
<html lang="uk">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KYIV ESTATE</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;font-size:16px;line-height:1.45}.wrap{max-width:850px;margin:0 auto;padding:46px 22px 70px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{font-size:32px;letter-spacing:.035em;margin:0;font-weight:700}.language-switch{display:flex;border:1px solid #d8d8dc;border-radius:10px;padding:3px}.language-switch button{margin:0;padding:7px 11px;border:0;background:transparent;color:#555}.language-switch button.active{background:#111;color:#fff}.panel{border:1px solid #dedee3;border-radius:16px;padding:24px;margin:20px 0;background:#fff}label{font-weight:600;display:block;margin:15px 0 7px}input,textarea,select{font:inherit;width:100%;border:1px solid #cfcfd5;border-radius:10px;padding:12px 13px;background:#fff;color:#111;outline:none}input:focus,textarea:focus,select:focus{border-color:#111;box-shadow:0 0 0 3px #11111110}textarea{min-height:175px;resize:vertical}.primary,.action{border:1px solid #111;border-radius:10px;background:#111;color:#fff;font:600 15px inherit;padding:11px 15px;cursor:pointer}.action{background:#fff;color:#111;border-color:#cacacf}.action:hover{border-color:#111}.action.active{background:#111;color:#fff}.primary:disabled,.action:disabled{opacity:.45;cursor:wait}.status{min-height:23px;margin:14px 0 8px;color:#606068}.status.error{color:#b42318}.progress{height:3px;background:#ededf0;margin-top:12px;overflow:hidden;border-radius:3px}.progress span{display:block;height:100%;width:0;background:#111;transition:width .25s}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.two{grid-template-columns:1fr 1fr}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 22px}.actions button{margin:0}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}.photo{position:relative;margin:0}.photo img{width:100%;aspect-ratio:1;display:block;object-fit:cover;border-radius:9px;border:1px solid #e1e1e5}.photo input{position:absolute;top:8px;left:8px;width:20px;height:20px;margin:0}.photo small{display:block;margin-top:5px;color:#666}.result{display:inline-block;padding:10px 12px;background:#f2f8f3;border:1px solid #cce4d1;border-radius:9px;color:#166534}.result a{color:inherit}.hint{font-size:13px;color:#6b6b73;margin-top:7px}@media(max-width:640px){.wrap{padding-top:28px}.top{align-items:flex-start}.brand{font-size:27px}.grid,.two{grid-template-columns:1fr}.language-switch{flex-shrink:0}.actions{gap:6px}.action,.primary{width:100%}}
</style>
<body><main class="wrap">
<header class="top"><h1 class="brand">KYIV ESTATE</h1><div class="language-switch" aria-label="Language"><button id="topUk" class="active" type="button">Українська</button><button id="topEn" type="button">English</button></div></header>
<section class="panel"><label for="listing" data-i18n="link">Посилання або Rieltor ID</label><input id="listing" autocomplete="url" placeholder="https://… або 12673334"><div class="progress" aria-hidden="true"><span id="progress"></span></div><p class="status" id="status"></p><button class="primary" id="extract" type="button">Create</button><button class="action" id="retry" type="button" hidden>Retry</button></section>
<section class="panel" id="editor" hidden>
  <div class="actions" id="readyActions"><button class="action active" id="ukPage" type="button">Ukrainian</button><button class="action" id="enPage" type="button">English</button><button class="action" id="photosButton" type="button">Photos</button><button class="action" id="publish" type="button">Publish</button><button class="action" id="downloadPdf" type="button">PDF</button><button class="action" id="createAnother" type="button">Create another</button></div>
  <label for="title" data-i18n="title">Заголовок</label><input id="title">
  <div class="grid"><div><label for="uah">UAH</label><input id="uah" inputmode="decimal"></div><div><label for="usd">USD</label><input id="usd" inputmode="decimal"></div><div><label for="eur">EUR</label><input id="eur" inputmode="decimal"></div></div>
  <p class="hint" id="rateInfo"></p>
  <div class="grid two"><div><label for="area" data-i18n="area">Площа (м²)</label><input id="area" inputmode="decimal"></div><div><label for="floor" data-i18n="floor">Поверх / поверховість</label><input id="floor" placeholder="2 / 5"></div></div>
  <label for="text" data-i18n="text">Опис</label><textarea id="text"></textarea>
  <div id="photosSection"><label data-i18n="photos">Фотографії</label><p class="hint" data-i18n="photoHint">Позначені фотографії входять до UA, EN, Telegraph і PDF. Оригінали не змінюються.</p><div class="photos" id="photos"></div></div>
  <p class="status" id="publishStatus"></p>
</section>
</main><script>
let listing={},lang='uk',translations={uk:{title:'',text:''},en:{title:'',text:''}},packageUrls=null;
const $=id=>document.getElementById(id);const words={uk:{link:'Посилання або Rieltor ID',title:'Заголовок',area:'Площа (м²)',floor:'Поверх / поверховість',text:'Опис',photos:'Фотографії',photoHint:'Позначені фотографії входять до UA, EN, Telegraph і PDF. Оригінали не змінюються.',reading:'Отримання даних…',translating:'Створення англійської версії…',packaging:'Створення UA/EN пакета…',publishing:'Публікація двох сторінок…',pdf:'Створення PDF…',ready:'Готово. Фото: ',noPhotos:'Фотографій не знайдено.',open:'Відкрити',published:'Опубліковано: '},en:{link:'Listing link or Rieltor ID',title:'Title',area:'Area (m²)',floor:'Floor / total floors',text:'Description',photos:'Photos',photoHint:'Selected photos are used in UA, EN, Telegraph and PDF. Originals remain unchanged.',reading:'Loading listing…',translating:'Creating English version…',packaging:'Creating UA/EN package…',publishing:'Publishing both pages…',pdf:'Creating PDF…',ready:'Ready. Photos: ',noPhotos:'No photos found.',open:'Open',published:'Published: '}};
function message(id,text,error=false){$(id).textContent=text;$(id).className='status'+(error?' error':'')}
function setProgress(value){$('progress').style.width=`${value}%`}
function storeCurrent(){if(!$('editor').hidden){translations[lang]={title:$('title').value,text:$('text').value}}}
function renderLanguage(){document.documentElement.lang=lang;document.querySelectorAll('[data-i18n]').forEach(node=>node.textContent=words[lang][node.dataset.i18n]);$('topUk').classList.toggle('active',lang==='uk');$('topEn').classList.toggle('active',lang==='en');$('ukPage').classList.toggle('active',lang==='uk');$('enPage').classList.toggle('active',lang==='en')}
async function ensureEnglish(){if(lang==='uk')storeCurrent();if(translations.en.text)return;message('publishStatus',words[lang].translating);const r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(translations.uk)}),d=await r.json();if(!r.ok)throw Error(d.error);translations.en=d}
async function switchLanguage(next){storeCurrent();if(next==='en'&&listing.internal_id)await ensureEnglish();lang=next;renderLanguage();if(listing.internal_id){$('title').value=translations[lang].title;$('text').value=translations[lang].text;message('publishStatus','')}}
function selectedImages(){return[...document.querySelectorAll('#photos input:checked')].map(input=>input.value)}
function payload(){storeCurrent();return{internal_id:listing.internal_id,source:listing.source,translations,details:{area:$('area').value,floor:$('floor').value},prices:{UAH:$('uah').value,USD:$('usd').value,EUR:$('eur').value,rate_date:listing.prices?.rate_date||'',rate_source:listing.prices?.rate_source||''},images:selectedImages(),language:lang,title:$('title').value,text:$('text').value}}
function showPhotos(images){$('photos').replaceChildren();if(!images.length){$('photos').textContent=words[lang].noPhotos;return}images.forEach((src,index)=>{const label=document.createElement('label');label.className='photo';const img=document.createElement('img');img.src=src;img.alt=`KYIV ESTATE ${index+1}`;const input=document.createElement('input');input.type='checkbox';input.checked=true;input.value=src;input.setAttribute('aria-label',`Include photo ${index+1}`);const note=document.createElement('small');note.textContent=`${String(index+1).padStart(2,'0')} · original`;label.append(img,input,note);$('photos').append(label)})}
async function createPackage(openLanguage){await ensureEnglish();message('publishStatus',words[lang].packaging);const r=await fetch('/api/package',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}),d=await r.json();if(!r.ok)throw Error(d.error);packageUrls=d;message('publishStatus','');if(openLanguage)window.open(d[openLanguage],'_blank','noopener')}
async function extract(){const button=$('extract');button.disabled=true;$('retry').hidden=true;setProgress(10);message('status',words[lang].reading);try{const r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('listing').value})}),d=await r.json();if(!r.ok)throw Error(d.error);setProgress(100);listing=d;translations={uk:{title:d.title,text:d.description},en:{title:'',text:''}};lang='uk';renderLanguage();$('title').value=d.title;$('text').value=d.description;$('uah').value=d.prices?.UAH||'';$('usd').value=d.prices?.USD||'';$('eur').value=d.prices?.EUR||'';$('area').value=d.details.area||'';$('floor').value=d.details.floor||'';$('rateInfo').textContent=d.prices?.rate_date?`NBU · ${d.prices.rate_date}`:'';showPhotos(d.images);$('editor').hidden=false;message('status',words[lang].ready+d.images.length)}catch(error){setProgress(0);message('status',error.message,true);$('retry').hidden=false}finally{button.disabled=false}}
$('extract').onclick=extract;$('retry').onclick=extract;$('topUk').onclick=()=>switchLanguage('uk').catch(e=>message('publishStatus',e.message,true));$('topEn').onclick=()=>switchLanguage('en').catch(e=>message('publishStatus',e.message,true));$('ukPage').onclick=()=>switchLanguage('uk').then(()=>createPackage('uk')).catch(e=>message('publishStatus',e.message,true));$('enPage').onclick=()=>switchLanguage('en').then(()=>createPackage('en')).catch(e=>message('publishStatus',e.message,true));$('photosButton').onclick=()=>$('photosSection').scrollIntoView({behavior:'smooth'});
$('publish').onclick=async()=>{const button=$('publish');button.disabled=true;try{await ensureEnglish();message('publishStatus',words[lang].publishing);const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}),d=await r.json();if(!r.ok)throw Error(d.error);message('publishStatus','');$('publishStatus').innerHTML=`<span class="result">${words[lang].published}<a target="_blank" rel="noopener" href="${d.urls.uk}">UA</a> · <a target="_blank" rel="noopener" href="${d.urls.en}">EN</a></span>`}catch(e){message('publishStatus',e.message,true)}finally{button.disabled=false}};
$('downloadPdf').onclick=async()=>{const button=$('downloadPdf');button.disabled=true;message('publishStatus',words[lang].pdf);try{const r=await fetch('/api/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});if(!r.ok){const d=await r.json();throw Error(d.error)}const u=URL.createObjectURL(await r.blob()),a=document.createElement('a');a.href=u;a.download=`${listing.internal_id||'listing'}-${lang}.pdf`;a.click();URL.revokeObjectURL(u);message('publishStatus','')}catch(e){message('publishStatus',e.message,true)}finally{button.disabled=false}};
$('createAnother').onclick=()=>{listing={};translations={uk:{title:'',text:''},en:{title:'',text:''}};packageUrls=null;$('listing').value='';$('editor').hidden=true;setProgress(0);message('status','');$('listing').focus()};renderLanguage();
</script></body></html>
