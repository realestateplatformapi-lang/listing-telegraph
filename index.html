<!doctype html>
<html lang="uk">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KYIV ESTATE</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;font-size:16px;line-height:1.45}.wrap{max-width:980px;margin:0 auto;padding:46px 22px 70px}.top,.create-row,.actions,.mode-switch{display:flex;align-items:center;gap:10px}.top{justify-content:space-between}.brand{font-size:32px;letter-spacing:.035em;margin:0;font-weight:700}.language-switch,.mode-switch{border:1px solid #d8d8dc;border-radius:10px;padding:3px}.language-switch button,.mode-switch button{margin:0;padding:8px 12px;border:0;border-radius:7px;background:transparent;color:#555;cursor:pointer;font:inherit}.language-switch button.active,.mode-switch button.active{background:#111;color:#fff}.panel{border:1px solid #dedee3;border-radius:16px;padding:24px;margin:20px 0;background:#fff}label{font-weight:600;display:block;margin:15px 0 7px}input,textarea{font:inherit;width:100%;border:1px solid #cfcfd5;border-radius:10px;padding:12px 13px;background:#fff;color:#111;outline:none}input:focus,textarea:focus{border-color:#111;box-shadow:0 0 0 3px #11111110}textarea{min-height:210px;resize:vertical}.primary,.action{border:1px solid #111;border-radius:10px;background:#111;color:#fff;font:600 15px inherit;padding:11px 15px;cursor:pointer}.action{background:#fff;color:#111;border-color:#cacacf}.action:hover{border-color:#111}.primary:disabled,.action:disabled{opacity:.45;cursor:wait}.create-row{margin-top:16px}.status{min-height:23px;margin:14px 0 8px;color:#606068}.status.error{color:#b42318}.progress{height:3px;background:#ededf0;margin-top:12px;overflow:hidden;border-radius:3px}.progress span{display:block;height:100%;width:0;background:#111;transition:width .25s}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.two{grid-template-columns:1fr 1fr}.facts{border-top:1px solid #e2e2e6;border-bottom:1px solid #e2e2e6;padding:4px 0 20px;margin:22px 0}.facts h2,.section-title{font-size:21px;margin:20px 0 4px}.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px}.text-card,.media-pane{border:1px solid #dedee3;border-radius:14px;padding:14px;background:#fff}.text-card.main,.media-pane.main{border-color:#c99d45;background:#fffaf0;box-shadow:0 0 0 2px #c99d4520}.text-card label,.media-pane h3{margin:0 0 9px;font-size:14px}.text-card textarea{border:0;padding:0;box-shadow:none;background:transparent}.text-card textarea[readonly]{color:#666}.actions{flex-wrap:wrap;margin:4px 0 22px}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;min-height:90px}.photo{position:relative;margin:0;cursor:grab;user-select:none;touch-action:none}.photo.dragging{opacity:.45;cursor:grabbing}.photo img{width:100%;aspect-ratio:1;display:block;object-fit:cover;border-radius:9px;border:1px solid #e1e1e5;background:#f4f4f5}.photo input{position:absolute;top:8px;left:8px;width:20px;height:20px;margin:0}.photo small{display:block;margin-top:5px;color:#666}.media-pane.dragover{outline:2px solid #c99d45;outline-offset:2px}.result{display:inline-block;padding:10px 12px;background:#f2f8f3;border:1px solid #cce4d1;border-radius:9px;color:#166534}.result a{color:inherit}.hint{font-size:13px;color:#6b6b73;margin-top:7px}.mode-help{font-size:12px;color:#777;margin:8px 0 0}.hidden{display:none!important}@media(max-width:720px){.wrap{padding-top:28px}.top{align-items:flex-start}.brand{font-size:27px}.grid,.two,.compare{grid-template-columns:1fr}.create-row{align-items:stretch;flex-direction:column}.mode-switch{justify-content:stretch}.mode-switch button{flex:1}.actions{gap:6px}.action,.primary{width:100%}}
html,body,button,input,textarea{font-family:Arial,"Helvetica Neue",sans-serif!important}.primary,.action{font-family:inherit!important;font-size:15px;font-weight:600}
</style>
<body><main class="wrap">
<header class="top"><h1 class="brand">KYIV ESTATE</h1><div class="language-switch" aria-label="Language"><button id="topUk" class="active" type="button">Ukrainian</button><button id="topEn" type="button">English</button></div></header>
<section class="panel">
  <label for="listing">Paste a link</label>
  <input id="listing" autocomplete="url" placeholder="https://…">
  <div class="progress" aria-hidden="true"><span id="progress"></span></div><p class="status" id="status"></p>
  <div class="create-row"><button class="primary" id="extract" type="button">Create</button><div class="mode-switch" aria-label="Photo mode"><button id="browserMode" class="active" type="button">Browser</button><button id="aiMode" type="button">AI processing</button></div><button class="action" id="retry" type="button" hidden>Retry</button></div>
</section>
<section class="panel" id="editor" hidden>
  <div class="actions"><button class="action" id="publish" type="button">Publish Telegraph</button><button class="action" id="downloadPdf" type="button">Publish PDF</button><button class="action" id="createAnother" type="button">Create another</button></div>
  <label for="title">Title</label><input id="title">
  <section class="facts"><h2>💰 Price</h2><div class="grid"><div><label for="uah">UAH</label><input id="uah" inputmode="decimal"></div><div><label for="usd">USD</label><input id="usd" inputmode="decimal"></div><div><label for="eur">EUR</label><input id="eur" inputmode="decimal"></div></div><p class="hint" id="rateInfo"></p><h2>🏠 Property details</h2><div class="grid two"><div><label for="area">Area (m²)</label><input id="area" inputmode="decimal"></div><div><label for="floor">Floor / total floors</label><input id="floor" placeholder="2 / 5"></div></div></section>
  <h2 class="section-title">📝 Description</h2><div class="compare"><section class="text-card"><label for="originalText">Original text</label><textarea id="originalText" readonly></textarea></section><section class="text-card main"><label for="text">AI text · Main</label><textarea id="text"></textarea></section></div>
  <section id="photosSection"><h2 class="section-title">📷 Photos</h2><p class="hint" id="photoHint">Only selected property photos are used.</p><div class="photos" id="photos"></div><div class="compare hidden" id="mediaCompare"><section class="media-pane main" id="processedPane"><h3>AI processed · Main</h3><div class="photos" id="processedPhotos"></div></section><section class="media-pane" id="originalPane"><h3>Original</h3><div class="photos" id="originalPhotos"></div></section></div></section>
  <p class="status" id="publishStatus"></p>
</section>
</main><script>
let listing={},lang='uk',processingMode='browser',translations={uk:{title:'',text:''},en:{title:'',text:''}},packageUrls=null,mediaPairs=[],movingMedia=null,browserItems=[],browserMoving=null;
const $=id=>document.getElementById(id);const words={uk:{reading:'Loading listing…',translating:'Creating English version…',processing:'Processing and sorting photos on the Windows workstation…',publishing:'Publishing Ukrainian and English pages…',pdf:'Creating PDF…',ready:'Ready. Property photos: ',published:'Published: '},en:{reading:'Loading listing…',translating:'Creating English version…',processing:'Processing and sorting photos on the Windows workstation…',publishing:'Publishing Ukrainian and English pages…',pdf:'Creating PDF…',ready:'Ready. Property photos: ',published:'Published: '}};
function message(id,text,error=false){$(id).textContent=text;$(id).className='status'+(error?' error':'')}
function setProgress(value){$('progress').style.width=`${value}%`}
function setMode(mode){processingMode=mode;$('browserMode').classList.toggle('active',mode==='browser');$('aiMode').classList.toggle('active',mode==='ai')}
function refineText(value){const seen=new Set();return String(value||'').split(/(?<=[.!?])\s+|\n+/).map(x=>x.trim()).filter(x=>{const key=x.toLowerCase().replace(/\s+/g,' ');if(!key||seen.has(key))return false;seen.add(key);return true}).join(' ')}
function storeCurrent(){if(!$('editor').hidden)translations[lang]={title:$('title').value,text:$('text').value}}
function renderLanguage(){document.documentElement.lang=lang;$('topUk').classList.toggle('active',lang==='uk');$('topEn').classList.toggle('active',lang==='en')}
async function ensureEnglish(){if(lang==='uk')storeCurrent();if(translations.en.text)return;message('publishStatus',words[lang].translating);const r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(translations.uk)}),d=await r.json();if(!r.ok)throw Error(d.error);translations.en=d}
async function switchLanguage(next){storeCurrent();if(next==='en'&&listing.internal_id)await ensureEnglish();lang=next;renderLanguage();if(listing.internal_id){$('title').value=translations[lang].title;$('text').value=translations[lang].text;message('publishStatus','')}}
function selectedIndexes(){if(processingMode==='ai'&&mediaPairs.length)return mediaPairs.filter(x=>x.included).map(x=>x.order-1);return browserItems.filter(x=>x.included).map(x=>x.originalIndex)}
function selectedImages(){return processingMode==='ai'?listing.images:browserItems.filter(x=>x.included).map(x=>x.src)}
function mediaChoices(){return processingMode==='ai'?mediaPairs.filter(x=>x.included).map(x=>({order:x.order,kind:x.kind})):[]}
function payload(){storeCurrent();return{internal_id:listing.internal_id,source:listing.source,processing_mode:processingMode,media_choices:mediaChoices(),translations,details:{area:$('area').value,floor:$('floor').value},prices:{UAH:$('uah').value,USD:$('usd').value,EUR:$('eur').value,rate_date:listing.prices?.rate_date||'',rate_source:listing.prices?.rate_source||''},images:selectedImages(),language:lang,title:$('title').value,text:$('text').value}}
function photoCard(src,index,checked=true,note='original'){const label=document.createElement('label');label.className='photo';const img=document.createElement('img');img.src=src;img.draggable=false;img.alt=`KYIV ESTATE property photo ${index+1}`;const input=document.createElement('input');input.type='checkbox';input.checked=checked;input.dataset.index=index;input.setAttribute('aria-label',`Include photo ${index+1}`);const small=document.createElement('small');small.textContent=`${String(index+1).padStart(2,'0')} · ${note}`;label.append(img,input,small);return label}
function renderBrowserPhotos(){const root=$('photos');root.replaceChildren();browserItems.forEach((item,index)=>{const card=photoCard(item.src,index,item.included,'original');card.dataset.originalIndex=item.originalIndex;card.querySelector('input').onchange=e=>item.included=e.target.checked;card.onmousedown=e=>{if(e.target.tagName==='INPUT')return;browserMoving={item,card};card.classList.add('dragging');e.preventDefault()};root.append(card)})}
function showBrowserPhotos(images){browserItems=images.map((src,originalIndex)=>({src,originalIndex,included:true}));$('photos').classList.remove('hidden');$('mediaCompare').classList.add('hidden');renderBrowserPhotos()}
function pointerSwap(card,pair){card.onmousedown=e=>{if(e.target.tagName==='INPUT')return;movingMedia={pair,kind:card.dataset.kind,card};card.classList.add('dragging');e.preventDefault()}}
document.addEventListener('mouseup',e=>{const hit=document.elementFromPoint(e.clientX,e.clientY);if(browserMoving){browserMoving.card.classList.remove('dragging');const target=hit?.closest('#photos .photo');if(target){const from=browserItems.indexOf(browserMoving.item),to=browserItems.findIndex(x=>x.originalIndex===Number(target.dataset.originalIndex));if(from>=0&&to>=0&&from!==to){browserItems.splice(from,1);browserItems.splice(to,0,browserMoving.item)}}browserMoving=null;renderBrowserPhotos();return}if(!movingMedia)return;const pane=hit?.closest('.media-pane'),target=hit?.closest('.photo');movingMedia.card.classList.remove('dragging');if(pane){movingMedia.pair.kind=movingMedia.kind;movingMedia.pair.included=pane.id==='processedPane';if(pane.id==='processedPane'&&target){const targetPair=mediaPairs.find(x=>x.order===Number(target.dataset.order)),from=mediaPairs.indexOf(movingMedia.pair),to=mediaPairs.indexOf(targetPair);if(from>=0&&to>=0&&from!==to){mediaPairs.splice(from,1);mediaPairs.splice(to,0,movingMedia.pair)}}renderMediaCompare()}movingMedia=null});
function renderMediaCompare(){const main=$('processedPhotos'),original=$('originalPhotos');main.replaceChildren();original.replaceChildren();mediaPairs.forEach((pair,index)=>{const mainKind=pair.kind,altKind=mainKind==='processed'?'original':'processed';const mainCard=photoCard(pair[mainKind],index,pair.included,mainKind);mainCard.dataset.order=pair.order;mainCard.dataset.kind=mainKind;mainCard.querySelector('input').onchange=e=>pair.included=e.target.checked;const altCard=photoCard(pair[altKind],index,false,altKind);altCard.querySelector('input').remove();altCard.dataset.order=pair.order;altCard.dataset.kind=altKind;for(const card of [mainCard,altCard])pointerSwap(card,pair);main.append(mainCard);original.append(altCard)})}
function enableDrop(pane){pane.ondragover=e=>{e.preventDefault();pane.classList.add('dragover')};pane.ondragleave=()=>pane.classList.remove('dragover');pane.ondrop=e=>{e.preventDefault();pane.classList.remove('dragover');const data=JSON.parse(e.dataTransfer.getData('text/plain'));const pair=mediaPairs.find(x=>x.order===data.order);if(pair){pair.kind=data.kind;if(pane.id==='originalPane')pair.included=false;else pair.included=true;renderMediaCompare()}}}
async function createPackage(){await ensureEnglish();message('publishStatus',words[lang].processing);setProgress(60);const r=await fetch('/api/package',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}),d=await r.json();if(!r.ok)throw Error(d.error);packageUrls=d;setProgress(100);return d}
async function extract(){const button=$('extract');button.disabled=true;$('retry').hidden=true;setProgress(10);message('status',words[lang].reading);try{const r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('listing').value})}),d=await r.json();if(!r.ok)throw Error(d.error);listing=d;translations={uk:{title:d.title,text:refineText(d.description)},en:{title:'',text:''}};lang='uk';renderLanguage();$('title').value=d.title;$('text').value=translations.uk.text;$('originalText').value=d.original_description||d.description;$('uah').value=d.prices?.UAH||'';$('usd').value=d.prices?.USD||'';$('eur').value=d.prices?.EUR||'';$('area').value=d.details.area||'';$('floor').value=d.details.floor||'';$('rateInfo').textContent=d.prices?.rate_date?`NBU · ${d.prices.rate_date}`:'';$('editor').hidden=false;if(processingMode==='ai'){showBrowserPhotos(d.images);const pack=await createPackage();mediaPairs=pack.processed.map((src,index)=>({order:index+1,processed:src,original:pack.originals[index]||d.images[index],kind:'processed',included:true}));$('photos').classList.add('hidden');$('mediaCompare').classList.remove('hidden');renderMediaCompare()}else{mediaPairs=[];showBrowserPhotos(d.images);setProgress(100)}message('status',words[lang].ready+d.images.length);message('publishStatus','')}catch(error){setProgress(0);message('status',error.message,true);$('retry').hidden=false}finally{button.disabled=false}}
$('extract').onclick=extract;$('retry').onclick=extract;$('browserMode').onclick=()=>setMode('browser');$('aiMode').onclick=()=>setMode('ai');$('topUk').onclick=()=>switchLanguage('uk').catch(e=>message('publishStatus',e.message,true));$('topEn').onclick=()=>switchLanguage('en').catch(e=>message('publishStatus',e.message,true));enableDrop($('processedPane'));enableDrop($('originalPane'));
$('publish').onclick=async()=>{const button=$('publish');button.disabled=true;try{await ensureEnglish();message('publishStatus',words[lang].publishing);const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}),d=await r.json();if(!r.ok)throw Error(d.error);$('publishStatus').innerHTML=`<span class="result">${words[lang].published}<a target="_blank" rel="noopener" href="${d.urls.uk}">UA</a> · <a target="_blank" rel="noopener" href="${d.urls.en}">EN</a></span>`}catch(e){message('publishStatus',e.message,true)}finally{button.disabled=false}};
$('downloadPdf').onclick=async()=>{const button=$('downloadPdf');button.disabled=true;message('publishStatus',words[lang].pdf);try{if(processingMode==='ai')await createPackage();const r=await fetch('/api/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});if(!r.ok){const d=await r.json();throw Error(d.error)}const u=URL.createObjectURL(await r.blob()),a=document.createElement('a');a.href=u;a.download=`${listing.internal_id||'listing'}-${lang}.pdf`;a.click();URL.revokeObjectURL(u);message('publishStatus','')}catch(e){message('publishStatus',e.message,true)}finally{button.disabled=false}};
$('createAnother').onclick=()=>{listing={};translations={uk:{title:'',text:''},en:{title:'',text:''}};packageUrls=null;mediaPairs=[];browserItems=[];$('listing').value='';$('editor').hidden=true;setProgress(0);message('status','');$('listing').focus()};renderLanguage();
</script></body></html>
