<!doctype html>
<html lang="uk"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Оголошення → Telegraph</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f6f7;color:#1f252c;font:16px system-ui,-apple-system,sans-serif}.wrap{max-width:850px;margin:0 auto;padding:52px 22px}h1{font-size:34px;margin:0 0 9px}.lead{color:#667085;margin:0 0 28px}.card{background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:24px;margin:18px 0;box-shadow:0 2px 8px #1018280b}label{font-weight:650;display:block;margin:15px 0 7px}input,textarea{font:inherit;width:100%;border:1px solid #d0d5dd;border-radius:9px;padding:11px}textarea{min-height:140px;resize:vertical}button{border:0;border-radius:9px;background:#168acd;color:#fff;font:600 16px inherit;padding:12px 17px;cursor:pointer}button:disabled{opacity:.5;cursor:wait}.secondary{background:#344054}.status{min-height:24px;margin:14px 0;color:#475467}.error{color:#b42318}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}.photo{position:relative}.photo img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px}.photo input{position:absolute;top:8px;left:8px;width:auto}.result{padding:14px;background:#ecfdf3;border-radius:9px;color:#027a48}a{color:#0575ba}
</style>
<body><main class="wrap"><h1>Оголошення → Telegraph</h1>
<section class="card"><label for="listing">Посилання на оголошення</label><input id="listing" type="url" placeholder="https://www.olx.ua/d/..." required><p class="status" id="status"></p><button id="extract">Отримати оголошення</button></section>
<section class="card" id="editor" hidden><label for="title">Заголовок</label><input id="title"><label for="text">Текст статті</label><textarea id="text"></textarea><label>Фотографії</label><div class="photos" id="photos"></div><p class="status" id="publishStatus"></p><button id="publish">Опублікувати в Telegraph</button></section>
</main><script>
let listing={};const $=id=>document.getElementById(id);const message=(id,text,error=false)=>{$(id).textContent=text;$(id).className='status '+(error?'error':'')};
$('extract').onclick=async()=>{const b=$('extract');b.disabled=true;message('status','Читаю оголошення…');try{const r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('listing').value})}),d=await r.json();if(!r.ok)throw Error(d.error);listing=d;$('title').value=d.title;$('text').value=d.description;$('photos').innerHTML=d.images.map((src,i)=>`<label class="photo"><img src="${src}" alt="Фото ${i+1}"><input type="checkbox" checked value="${src}" aria-label="Додати фото ${i+1}"></label>`).join('')||'<p>Фотографій не знайдено — статтю можна опублікувати без них.</p>';$('editor').hidden=false;message('status',`Готово: знайдено фото — ${d.images.length}.`)}catch(e){message('status',e.message,true)}finally{b.disabled=false}};
$('publish').onclick=async()=>{const b=$('publish');b.disabled=true;message('publishStatus','Публікую…');try{const images=[...document.querySelectorAll('#photos input:checked')].map(x=>x.value),r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:$('title').value,text:$('text').value,images,source:listing.source})}),d=await r.json();if(!r.ok)throw Error(d.error);$('publishStatus').innerHTML=`<span class="result">Готово: <a target="_blank" rel="noopener" href="${d.url}">відкрити статтю в Telegraph</a></span>`}catch(e){message('publishStatus',e.message,true)}finally{b.disabled=false}};
</script></body></html>
