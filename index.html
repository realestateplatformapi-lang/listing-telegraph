<!doctype html>
<html lang="uk"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Оголошення → Telegraph</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f6f7;color:#1f252c;font:16px system-ui,-apple-system,sans-serif}.wrap{max-width:850px;margin:0 auto;padding:44px 22px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}h1{font-size:34px;margin:0}.card{background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:24px;margin:18px 0;box-shadow:0 2px 8px #1018280b}label{font-weight:650;display:block;margin:15px 0 7px}input,textarea,select{font:inherit;width:100%;border:1px solid #d0d5dd;border-radius:9px;padding:11px}textarea{min-height:170px;resize:vertical}button{border:0;border-radius:9px;background:#168acd;color:#fff;font:600 16px inherit;padding:12px 17px;cursor:pointer;margin:8px 8px 0 0}button:disabled{opacity:.5;cursor:wait}.secondary{background:#344054}.status{min-height:24px;margin:14px 0;color:#475467}.error{color:#b42318}.grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}.photo{position:relative}.photo img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px}.photo input{position:absolute;top:8px;left:8px;width:auto}.result{padding:14px;background:#ecfdf3;border-radius:9px;color:#027a48}a{color:#0575ba}@media(max-width:580px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
<body><main class="wrap"><div class="top"><h1 data-i18n="app">Оголошення → Telegraph</h1><select id="language" aria-label="Language"><option value="uk">Українська</option><option value="en">English</option></select></div>
<section class="card"><label for="listing" data-i18n="link">Посилання на оголошення</label><input id="listing" type="url" placeholder="https://www.olx.ua/d/..." required><p class="status" id="status"></p><button id="extract" data-i18n="extract">Отримати оголошення</button></section>
<section class="card" id="editor" hidden><label for="title" data-i18n="title">Заголовок</label><input id="title"><div class="grid"><div><label for="price" data-i18n="price">Ціна</label><input id="price" inputmode="decimal"></div><div><label for="currency" data-i18n="currency">Валюта</label><select id="currency"></select></div><div><label for="area" data-i18n="area">Площа (м²)</label><input id="area" inputmode="decimal"></div></div><label for="floor" data-i18n="floor">Поверх / поверховість</label><input id="floor" placeholder="2 / 5"><label for="text" data-i18n="text">Текст статті</label><textarea id="text"></textarea><label data-i18n="photos">Фотографії</label><div class="photos" id="photos"></div><p class="status" id="publishStatus"></p><button id="publish" data-i18n="publish">Опублікувати в Telegraph</button><button class="secondary" id="downloadPdf" data-i18n="pdf">Завантажити PDF</button></section>
</main><script>
let listing={},lang='uk';const $=id=>document.getElementById(id);const message=(id,text,error=false)=>{$(id).textContent=text;$(id).className='status '+(error?'error':'')};
const words={uk:{app:'Оголошення → Telegraph',link:'Посилання на оголошення',extract:'Отримати оголошення',title:'Заголовок',price:'Ціна',currency:'Валюта',area:'Площа (м²)',floor:'Поверх / поверховість',text:'Текст статті',photos:'Фотографії',publish:'Опублікувати в Telegraph',pdf:'Завантажити PDF',reading:'Читаю оголошення…',ready:'Готово: знайдено фото — ',publishing:'Публікую…',pdfMaking:'Створюю PDF…',translated:'Перекладено англійською.',noPhotos:'Фотографій не знайдено — статтю можна опублікувати без них.',open:'відкрити статтю в Telegraph'},en:{app:'Listing → Telegraph',link:'Listing link',extract:'Get listing',title:'Title',price:'Price',currency:'Currency',area:'Area (m²)',floor:'Floor / total floors',text:'Article text',photos:'Photos',publish:'Publish to Telegraph',pdf:'Download PDF',reading:'Reading listing…',ready:'Done: photos found — ',publishing:'Publishing…',pdfMaking:'Creating PDF…',translated:'Translated into English.',noPhotos:'No photos found — you can publish without them.',open:'open Telegraph article'}};
function currencies(){const v=$('currency').value;const opts=lang==='en'?['USD','EUR']:['UAH'];$('currency').innerHTML=opts.map(x=>`<option ${x===v?'selected':''}>${x}</option>`).join('');if(!opts.includes(v))$('currency').value=opts[0]}
function render(){document.documentElement.lang=lang;document.title=words[lang].app;document.querySelectorAll('[data-i18n]').forEach(x=>x.textContent=words[lang][x.dataset.i18n]);currencies()}
function payload(){return {title:$('title').value,text:$('text').value,language:lang,details:{price:$('price').value,currency:$('currency').value,area:$('area').value,floor:$('floor').value},images:[...document.querySelectorAll('#photos input:checked')].map(x=>x.value),source:listing.source}}
function showPhotos(images){$('photos').innerHTML=images.map((src,i)=>`<label class="photo"><img src="${src}" alt="Photo ${i+1}"><input type="checkbox" checked value="${src}" aria-label="Add photo ${i+1}"></label>`).join('')||`<p>${words[lang].noPhotos}</p>`}
$('extract').onclick=async()=>{const b=$('extract');b.disabled=true;message('status',words[lang].reading);try{const r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('listing').value})}),d=await r.json();if(!r.ok)throw Error(d.error);listing=d;listing.originalTitle=d.title;listing.originalText=d.description;$('title').value=d.title;$('text').value=d.description;$('price').value=d.details.price;$('area').value=d.details.area;$('floor').value=d.details.floor;$('currency').value=d.details.currency;currencies();showPhotos(d.images);$('editor').hidden=false;message('status',words[lang].ready+d.images.length+'.')}catch(e){message('status',e.message,true)}finally{b.disabled=false}};
$('language').onchange=async e=>{lang=e.target.value;render();if(!listing.originalTitle)return;if(lang==='uk'){$('title').value=listing.originalTitle;$('text').value=listing.originalText;return}message('publishStatus','Translating…');try{const r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:listing.originalTitle,text:listing.originalText})}),d=await r.json();if(!r.ok)throw Error(d.error);$('title').value=d.title;$('text').value=d.text;message('publishStatus',words.en.translated)}catch(e){message('publishStatus',e.message,true)}};
$('publish').onclick=async()=>{const b=$('publish');b.disabled=true;message('publishStatus',words[lang].publishing);try{const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}),d=await r.json();if(!r.ok)throw Error(d.error);$('publishStatus').innerHTML=`<span class="result">Done: <a target="_blank" rel="noopener" href="${d.url}">${words[lang].open}</a></span>`}catch(e){message('publishStatus',e.message,true)}finally{b.disabled=false}};
$('downloadPdf').onclick=async()=>{const b=$('downloadPdf');b.disabled=true;message('publishStatus',words[lang].pdfMaking);try{const r=await fetch('/api/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});if(!r.ok){const d=await r.json();throw Error(d.error)}const u=URL.createObjectURL(await r.blob()),a=document.createElement('a');a.href=u;a.download='listing.pdf';a.click();URL.revokeObjectURL(u);message('publishStatus','')}catch(e){message('publishStatus',e.message,true)}finally{b.disabled=false}};render();
</script></body></html>
